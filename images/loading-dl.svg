<?xml version="1.0" encoding="UTF-8"?>
<svg id="dl-loading-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148.97 178.7" role="img" aria-labelledby="dl-loading-title">
  <title id="dl-loading-title">DL loading animation</title>
  <defs>
    <linearGradient id="shieldGradient" x1="12" y1="158" x2="142" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#29285b"/>
      <stop offset="38%" stop-color="#35348f"/>
      <stop offset="72%" stop-color="#066938"/>
      <stop offset="100%" stop-color="#0aa85a"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 74.5 89.35" to="360 74.5 89.35" dur="4.8s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="chartReveal">
      <rect x="37" y="38" width="0" height="92">
        <animate attributeName="width" values="0;0;113;113" keyTimes="0;.12;.72;1" dur="2.4s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <style>
      #dl-loading-mark {
        overflow: visible;
      }

      .shield {
        fill: url(#shieldGradient);
        transform-origin: 74.5px 89.35px;
        animation: shieldPulse 2.4s ease-in-out infinite;
      }

      .chart {
        fill: #066938;
        opacity: 1;
        clip-path: url(#chartReveal);
      }

      @keyframes shieldPulse {
        0%, 100% {
          transform: scale(1);
          opacity: .94;
        }

        50% {
          transform: scale(1.025);
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .shield {
          animation: none;
        }
      }
    </style>
  </defs>
